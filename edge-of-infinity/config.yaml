name: Edge of Infinity
version: "0.10.2"
slug: edge_of_infinity
description: Private low-latency live NVR core for Hikvision and ONVIF cameras
url: https://github.com/edge-of-infinity/home-assistant-app
arch:
  - amd64
  - aarch64
startup: application
boot: auto
stage: experimental
init: false
ingress: true
ingress_port: 8088
ingress_entry: /
ingress_stream: true
panel_icon: mdi:cctv
panel_title: Edge Infinity
panel_admin: true
watchdog: http://[HOST]:[PORT:8088]/health
webui: http://[HOST]:[PORT:8088]/
ports:
  8088/tcp: 8088
  8556/tcp: null
  8888/tcp: 8888
  8889/tcp: 8889
  8189/tcp: 8189
  8189/udp: 8189
  8192/tcp: 8192
  8193/tcp: 8193
  8890/udp: null
  9997/tcp: null
ports_description:
  8088/tcp: Edge Core API and web interface
  8556/tcp: MediaMTX RTSP proxy disabled by default to avoid host port conflicts
  8888/tcp: MediaMTX low-latency HLS
  8889/tcp: MediaMTX WebRTC WHEP/WHIP
  8189/tcp: MediaMTX WebRTC ICE TCP fallback
  8189/udp: MediaMTX WebRTC ICE UDP
  8192/tcp: Janus HTTP API (changed from 8188 to avoid conflict)
  8193/tcp: Janus WebSocket API (changed from 8190 to avoid conflict)
  8890/udp: MediaMTX SRT relay disabled by default
  9997/tcp: MediaMTX local API disabled by default
map:
  - type: homeassistant_config
    read_only: false
    path: /homeassistant
  - type: addon_config
    read_only: false
    path: /config
  - type: media
    read_only: false
    path: /media
options:
  log_level: info
  api_port: 8088
  recordings_dir: /media/edge-of-infinity/recordings
  database_path: /homeassistant/edge/edge.db
  retention_days: 14
  install_custom_component: true
  sync_addon_options: false
  core_engine: mediamtx_janus
  mediamtx_enabled: true
  mediamtx_rtsp_port: 8556
  mediamtx_hls_port: 8888
  mediamtx_hls_always_remux: false
  mediamtx_webrtc_port: 8889
  mediamtx_webrtc_udp_port: 8189
  mediamtx_webrtc_public_url: ""
  mediamtx_webrtc_public_hosts: homeassistant.local,192.168.33.17
  mediamtx_webrtc_stun_url: stun:stun.l.google.com:19302
  mediamtx_webrtc_turn_url: ""
  mediamtx_webrtc_turn_username: ""
  mediamtx_webrtc_turn_password: ""
  mediamtx_webrtc_ice_transport: auto
  mediamtx_webrtc_tcp_only: false
  mediamtx_srt_port: 8890
  mediamtx_api_port: 9997
  mediamtx_record: true
  janus_enabled: true
  janus_http_port: 8192
  janus_ws_port: 8193
  janus_bufferkf_ms: 2000
  hikvision_1_enabled: false
  hikvision_1_name: Hikvision 1
  hikvision_1_host: ""
  hikvision_1_username: admin
  hikvision_1_password: ""
  hikvision_1_camera_number: "1"
  hikvision_1_access_protocol: rtsp
  hikvision_1_rtsp_transport: tcp
  hikvision_1_rtsp_main: ""
  hikvision_1_rtsp_sub: ""
  hikvision_1_onvif_url: ""
  hikvision_1_isapi_base_url: ""
  hikvision_1_record: true
  hikvision_1_low_latency: true
  hikvision_1_snapshot_stream: sub
  hikvision_1_live_stream: sub
  hikvision_1_record_stream: main
  hikvision_2_enabled: false
  hikvision_2_name: Hikvision 2
  hikvision_2_host: ""
  hikvision_2_username: admin
  hikvision_2_password: ""
  hikvision_2_camera_number: "2"
  hikvision_2_access_protocol: rtsp
  hikvision_2_rtsp_transport: tcp
  hikvision_2_rtsp_main: ""
  hikvision_2_rtsp_sub: ""
  hikvision_2_onvif_url: ""
  hikvision_2_isapi_base_url: ""
  hikvision_2_record: true
  hikvision_2_low_latency: true
  hikvision_2_snapshot_stream: sub
  hikvision_2_live_stream: sub
  hikvision_2_record_stream: main
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  api_port: port
  recordings_dir: str
  database_path: str
  retention_days: int(1,365)
