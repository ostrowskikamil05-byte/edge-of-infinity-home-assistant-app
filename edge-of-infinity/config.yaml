name: Edge of Infinity
version: "0.4.21"
slug: edge_of_infinity
description: Private low-latency live NVR core for Hikvision and ONVIF cameras
url: https://github.com/edge-of-infinity/home-assistant-app
arch:
  - amd64
  - aarch64
startup: application
boot: auto
stage: experimental
init: false
ingress: true
ingress_port: 8088
ingress_entry: /
ingress_stream: true
panel_icon: mdi:cctv
panel_title: Edge Infinity
panel_admin: true
watchdog: http://[HOST]:[PORT:8088]/health
webui: http://[HOST]:[PORT:8088]/
ports:
  8088/tcp: 8088
ports_description:
  8088/tcp: Edge Core API and web interface
map:
  - type: homeassistant_config
    read_only: false
    path: /homeassistant
  - type: addon_config
    read_only: false
    path: /config
  - type: media
    read_only: false
    path: /media
options:
  log_level: info
  api_port: 8088
  recordings_dir: /media/edge-of-infinity/recordings
  database_path: /homeassistant/edge/edge.db
  retention_days: 14
  install_custom_component: true
  hikvision_1_enabled: false
  hikvision_1_name: Hikvision 1
  hikvision_1_host: ""
  hikvision_1_username: admin
  hikvision_1_password: ""
  hikvision_1_rtsp_main: ""
  hikvision_1_rtsp_sub: ""
  hikvision_1_onvif_url: ""
  hikvision_1_isapi_base_url: ""
  hikvision_1_record: true
  hikvision_1_low_latency: true
  hikvision_1_snapshot_stream: sub
  hikvision_2_enabled: false
  hikvision_2_name: Hikvision 2
  hikvision_2_host: ""
  hikvision_2_username: admin
  hikvision_2_password: ""
  hikvision_2_rtsp_main: ""
  hikvision_2_rtsp_sub: ""
  hikvision_2_onvif_url: ""
  hikvision_2_isapi_base_url: ""
  hikvision_2_record: true
  hikvision_2_low_latency: true
  hikvision_2_snapshot_stream: sub
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  api_port: port
  recordings_dir: str
  database_path: str
  retention_days: int(1,365)
  install_custom_component: bool
  hikvision_1_enabled: bool
  hikvision_1_name: str
  hikvision_1_host: str
  hikvision_1_username: str
  hikvision_1_password: password
  hikvision_1_rtsp_main: str
  hikvision_1_rtsp_sub: str
  hikvision_1_onvif_url: str
  hikvision_1_isapi_base_url: str
  hikvision_1_record: bool
  hikvision_1_low_latency: bool
  hikvision_1_snapshot_stream: list(sub|main)
  hikvision_2_enabled: bool
  hikvision_2_name: str
  hikvision_2_host: str
  hikvision_2_username: str
  hikvision_2_password: password
  hikvision_2_rtsp_main: str
  hikvision_2_rtsp_sub: str
  hikvision_2_onvif_url: str
  hikvision_2_isapi_base_url: str
  hikvision_2_record: bool
  hikvision_2_low_latency: bool
  hikvision_2_snapshot_stream: list(sub|main)
backup: hot
backup_exclude:
  - /media/edge-of-infinity/recordings
